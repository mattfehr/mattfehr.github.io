name = "portfolio-rag-chatbot"
main = "src/index.ts"
compatibility_date = "2024-12-18"

[ai]
binding = "AI"

[vars]
QDRANT_COLLECTION = "portfolio_chunks"
QDRANT_SCORE_THRESHOLD = "0.25"
ALLOWED_ORIGINS = "https://mattfehr.github.io,http://127.0.0.1:5500,http://localhost:5500,http://127.0.0.1:8080,http://localhost:8080"
GEMINI_CHAT_MODEL = "gemini-3.1-flash-lite"
RATE_LIMIT_MAX = "20"
RATE_LIMIT_WINDOW_MS = "60000"
